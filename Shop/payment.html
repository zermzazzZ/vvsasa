<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
   .back-btn {
  text-decoration: none;
  background: #ee4d2d;
  color: white;
  padding: 5px 10px;
  border-radius: 17px;
  transition: 0.1s;
}

.back-btn:hover {
  background: #000;
}
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4CAF50, #2e7d32);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
}

button {
  padding: 12px;
  width: 100%;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 20px;
}
</style>

</head>

<body>
<a href="shop.html" class="back-btn">🔙 Back</a>
<div class="box">
  <h2>💳 Payment</h2>

  <h3 id="total"></h3>

  <button onclick="pay()">Confirm Payment</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item => total += item.price);

document.getElementById("total").innerText = "Total: $" + total;

function pay() {
  alert("Payment Success 🎉");

  localStorage.removeItem("cart");

  window.location.href = "shop.html";
}
</script>

</body>
</html>
