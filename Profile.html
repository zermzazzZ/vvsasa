<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#ee4d2d,#ff6a00);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

header h2{
  font-weight:600;
}

header input{
  width:300px;
  padding:10px 15px;
  border:none;
  border-radius:25px;
  outline:none;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:linear-gradient(135deg,#444,#000);
  padding:10px 18px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  transition:0.3s;
}

.back-btn:hover{
  transform:scale(1.1);
  background:#ee4d2d;
}

/* LAYOUT */
.container{
  display:flex;
  padding:30px;
  gap:20px;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.sidebar h3{
  margin-bottom:15px;
}

.sidebar a{
  display:block;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  color:#ccc;
  text-decoration:none;
  transition:0.3s;
}

.sidebar a:hover{
  background:#ee4d2d;
  color:white;
}

/* MAIN */
.main{
  flex:1;
  background:#1c1c1c;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 25px rgba(0,0,0,0.5);
}

.main h2{
  margin-bottom:5px;
}

/* FORM */
.form-group{
  margin-bottom:15px;
}

label{
  color:#aaa;
  font-size:14px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:5px;
  background:#2a2a2a;
  color:white;
  outline:none;
}

input:focus, select:focus{
  border:1px solid #ee4d2d;
}

/* PROFILE IMAGE */
.profile-img{
  text-align:center;
}

.profile-img img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid #ee4d2d;
  margin-bottom:10px;
}

.profile-img input{
  margin-top:10px;
}

/* BUTTON */
button{
  background:linear-gradient(135deg,#ee4d2d,#ff6a00);
  border:none;
  padding:12px 25px;
  color:white;
  border-radius:25px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(255,100,0,0.5);
}
</style>

</head>

<body>



<header>
  <h2>🛒 SASA Shop</h2>
  <input placeholder="🔍 Search...">
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>👤 Username</h3>
    <a href="#">📄 Profile</a>
    <a href="#">🏦 Banks</a>
    <a href="#">📍 Address</a>
    <a href="#">🔒 Change Password</a>
    <a href="#">🔔 Notifications</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>My Profile</h2>
    <p style="color:#aaa;">Manage your account</p>

    <div style="display:flex; gap:30px; margin-top:20px;">

      <!-- FORM -->
      <div style="flex:1;">

        <div class="form-group">
          <label>Username</label>
          <input value="user123">
        </div>

        <div class="form-group">
          <label>Name</label>
          <input placeholder="Your name">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input placeholder="email@gmail.com">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input placeholder="012345678">
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date">
        </div>

        <button onclick="save()">💾 Save</button>

      </div>

      <!-- IMAGE -->
      <div class="profile-img">
        <img id="preview" src="https://via.placeholder.com/100">
        <p style="color:#aaa;">Select Image</p>
        <input type="file" onchange="previewImg(event)">
      </div>

    </div>

  </div>

</div>

<script>
function save(){
  alert("Saved ✅");
}

function previewImg(event){
  let img = document.getElementById("preview");
  img.src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>

<a href="shop.html" class="back-btn">🔙 Back</a>
