<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SASA Shop </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  .back-btn {
  display: inline-block;
  text-decoration: none;
  background: #ee4d2d;
  color: white;
  padding: 6px 12px;
  border-radius: 15px;
  margin-top: 10px;
}

.back-btn:hover {
  background: black;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg,#f8f9ff,#eef2ff,#ffffff);
color:#111;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:32px;
font-weight:800;
color:#ff0055;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
padding:16px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.8);
backdrop-filter:blur(18px);
box-shadow:0 8px 30px rgba(0,0,0,.08);
}

.logo{
font-size:32px;
font-weight:800;
background:linear-gradient(135deg,#ff5a00,#ff0055);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.right{
display:flex;
align-items:center;
gap:12px;
}

.search{
padding:12px 18px;
border:none;
outline:none;
border-radius:30px;
width:240px;
background:#f1f3f8;
}

.icon-btn{
width:44px;
height:44px;
border-radius:50%;
border:none;
cursor:pointer;
font-size:18px;
background:#111;
color:#fff;
}

.cart{
position:relative;
font-size:28px;
cursor:pointer;
}

.count{
position:absolute;
top:-8px;
right:-8px;
background:#ff0055;
color:#fff;
padding:4px 8px;
font-size:11px;
border-radius:50%;
font-weight:700;
}

/* HERO */
.hero{
padding:20px;
}

.slider{
height:450px;
border-radius:35px;
overflow:hidden;
position:relative;
box-shadow:0 25px 60px rgba(0,0,0,.15);
}

.slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:55px;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.overlay{
background:linear-gradient(to right,rgba(0,0,0,.72),rgba(0,0,0,.18));
position:absolute;
inset:0;
}

.content{
position:relative;
z-index:2;
color:#fff;
max-width:550px;
}

.content h1{
font-size:64px;
line-height:1.05;
margin-bottom:15px;
}

.content p{
font-size:18px;
margin-bottom:22px;
}

.content a{
display:inline-block;
padding:15px 28px;
border-radius:40px;
background:#fff;
color:#111;
font-weight:800;
text-decoration:none;
}

/* TITLE */
.title{
padding:0 20px;
font-size:30px;
font-weight:800;
margin:18px 0;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:22px;
padding:0 20px 50px;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 18px 35px rgba(0,0,0,.08);
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-10px);
}

.badge{
position:absolute;
top:14px;
left:14px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:800;
color:#fff;
background:linear-gradient(135deg,#ff0055,#ff7b00);
}

.wish{
position:absolute;
top:14px;
right:14px;
width:42px;
height:42px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:18px;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.body{
padding:20px;
}

.name{
font-size:20px;
font-weight:700;
margin-bottom:8px;
}

.desc{
font-size:13px;
color:#777;
margin-bottom:12px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.price{
font-size:26px;
font-weight:800;
color:#ff5a00;
}

.rate{
font-size:14px;
font-weight:700;
}

.buy{
width:100%;
padding:14px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff5a00,#ff0055);
color:#fff;
font-weight:800;
cursor:pointer;
}

/* CART */
.cart-box{
position:fixed;
top:0;
right:-430px;
width:420px;
height:100%;
background:rgba(255,255,255,.92);
backdrop-filter:blur(18px);
padding:24px;
transition:.4s;
z-index:3000;
overflow:auto;
box-shadow:-15px 0 40px rgba(0,0,0,.15);
}

.cart-box.active{
right:0;
}

.close{
float:right;
font-size:24px;
cursor:pointer;
font-weight:800;
}

.cart-box h2{
font-size:30px;
margin-bottom:18px;
}

.cart-box li{
list-style:none;
padding:14px 0;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
}

.qty{
display:flex;
gap:8px;
align-items:center;
}

.qty button{
width:28px;
height:28px;
border:none;
border-radius:50%;
background:#111;
color:#fff;
cursor:pointer;
}

.total{
font-size:30px;
font-weight:800;
margin-top:18px;
color:#ff0055;
}

.checkout{
display:block;
text-align:center;
padding:14px;
margin-top:16px;
border-radius:18px;
background:#111;
color:#fff;
text-decoration:none;
font-weight:800;
}

/* TOAST */
.toast{
position:fixed;
bottom:30px;
right:30px;
background:#111;
color:#fff;
padding:14px 20px;
border-radius:18px;
display:none;
z-index:9999;
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
left:20px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

.float a{
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
font-size:24px;
color:#fff;
background:#25D366;
box-shadow:0 8px 25px rgba(0,0,0,.2);
}

.float a:last-child{
background:#229ED9;
}

/* FOOTER */
footer{
padding:35px;
text-align:center;
color:#777;
}

/* MOBILE */
@media(max-width:768px){

.search{
display:none;
}

.slider{
height:280px;
}

.content h1{
font-size:34px;
}

.content p{
font-size:13px;
}

.products{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card img{
height:150px;
}

.name{
font-size:14px;
}

.price{
font-size:18px;
}

.cart-box{
width:100%;
right:-100%;
}

}
</style>
</head>

<body>

<div id="loader">Loading...</div>

<header>
<div class="logo"> SASA Shop</div>

<div class="right">
<input class="search" placeholder="Search product..." onkeyup="searchProduct(this.value)"> 
<button class="icon-btn" onclick="darkMode()">🌙</button>

<div class="cart" onclick="toggleCart()">

</div>
</header>
</div>
</section>

<style>

.profile-btn {
  background: black;
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  text-decoration: none;
}

.profile-btn:hover {
  background: #333;
}
/* CATEGORY SECTION */
.category{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:18px;
padding:20px;
}

/* ITEM */
.menu-item{
background:#fff;
border-radius:24px;
padding:18px 12px;
text-align:center;
text-decoration:none;
color:#111;
box-shadow:0 12px 25px rgba(0,0,0,.08);
transition:.35s;
position:relative;
overflow:hidden;
}

/* HOVER */
.menu-item:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 18px 35px rgba(0,0,0,.12);
}

/* ACTIVE PAGE */
.menu-item.active{
background:linear-gradient(135deg,#ff5a00,#ff0055);
color:#fff;
}

/* IMAGE */
.menu-item img{
width:75px;
height:75px;
object-fit:cover;
border-radius:18px;
margin-bottom:12px;
background:#fff;
padding:6px;
transition:.3s;
}

.menu-item:hover img{
transform:scale(1.08);
}

/* TEXT */
.menu-item p{
font-size:15px;
font-weight:700;
margin-top:6px;
}

/* MOBILE */
@media(max-width:768px){

.category{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.menu-item{
padding:14px 10px;
border-radius:20px;
}

.menu-item img{
width:60px;
height:60px;
}

.menu-item p{
font-size:13px;
}

}
</style>

<div class="float">
<a href="#" href="payment.html" class="checkout">💬</a>
</div>

<footer>
© 2026 – All rights reserved by SASA Shop Company Limited
</footer>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function render(data=items){
let html="";
data.forEach(item=>{
html+=`
<div class="card">
<div class="badge">HOT</div>
<div class="wish">♡</div>
<img src="${item.img}">
<div class="body">
<div class="name">${item.name}</div>
<div class="desc">Premium quality official product</div>
<div class="row">
<div class="price">$${item.price}</div>
<div class="rate">${item.rate}</div>
</div>
<button class="buy" onclick="add('${item.name}',${item.price},'${item.img}')">Add To Cart</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(name,price,img){
let f=cart.find(x=>x.name===name);
if(f){f.qty++;}
else{cart.push({name,price,img,qty:1});}
saveCart();
toast();
}

function plus(i){cart[i].qty++;saveCart();}
function minus(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);saveCart();}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
showCart();
}

function showCart(){
let list=document.getElementById("list");
let total=0;
list.innerHTML="";
cart.forEach((item,i)=>{
total+=item.price*item.qty;
list.innerHTML+=`
<li>
<div>${item.name}<br>$${item.price} x ${item.qty}</div>
<div class="qty">
<button onclick="minus(${i})">-</button>
<span>${item.qty}</span>
<button onclick="plus(${i})">+</button>
</div>
</li>`;
});
document.getElementById("count").innerText=
cart.reduce((a,b)=>a+b.qty,0);
document.getElementById("total").innerText="$"+total;
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function searchProduct(v){
v=v.toLowerCase();
render(items.filter(x=>x.name.toLowerCase().includes(v)));
}

function darkMode(){
document.body.style.background="#111";
document.body.style.color="#fff";
}

/* SLIDER */
let s=0;
setInterval(()=>{
let slides=document.querySelectorAll(".slide");
slides.forEach(x=>x.classList.remove("active"));
s=(s+1)%slides.length;
slides[s].classList.add("active");
},3000);

render();
showCart();
</script>
