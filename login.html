<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SASA Shop - Ultra Auth PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}body{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:linear-gradient(135deg,#111,#1a1a1a)}.left{display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#ee4d2d,#ff7a00);padding:40px;color:#fff}.left img{width:130px;height:130px;border-radius:50%;object-fit:cover;background:#fff;padding:8px;box-shadow:0 20px 50px rgba(0,0,0,.25)}.left h1{margin-top:16px;font-size:52px}.left p{opacity:.9}.right{display:flex;justify-content:center;align-items:center;padding:20px}.card{width:100%;max-width:430px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(18px);padding:30px;border-radius:26px;box-shadow:0 25px 70px rgba(0,0,0,.4)}.tabs{display:flex;gap:24px;margin-bottom:22px}.tab{color:#777;font-weight:700;cursor:pointer}.tab.active{color:#ff7a00}.group{margin-bottom:14px}.group input{width:100%;padding:14px;border-radius:14px;border:1px solid #333;background:#0e0e0e;color:#fff;outline:none}.group input:focus{border-color:#ff7a00}.btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(90deg,#ee4d2d,#ff7a00);color:#fff;font-weight:700;cursor:pointer}.meta{margin-top:12px;color:#999;font-size:13px;display:flex;justify-content:space-between}.social{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.social button{padding:12px;border:none;border-radius:12px;font-weight:700;cursor:pointer}.fb{background:#1877f2;color:#fff}.gg{background:#fff}.switch{margin-top:18px;color:#999;text-align:center}.switch span{color:#ff7a00;cursor:pointer;font-weight:700}.hidden{display:none}.msg{margin-top:12px;font-size:13px;color:#7CFC00}.err{color:#ff6b6b}@media(max-width:900px){body{grid-template-columns:1fr}.left{min-height:35vh}.left h1{font-size:40px}}
</style>
</head>
<body>
<section class="left">
<img src="images/sasa.jpg" alt="SASA Logo">
<h1>SASA Shop</h1>
<p>Fast • Secure • Modern</p>
</section>
<section class="right">
<div class="card">
<div class="tabs"><div id="loginTab" class="tab active" onclick="showLogin()">Log In</div><div id="signupTab" class="tab" onclick="showSignup()">Sign Up</div></div>
<div id="loginBox">
<div class="group"><input id="loginUser" placeholder="Email / Username"></div>
<div class="group"><input id="loginPass" type="password" placeholder="Password"></div>
<button class="btn" onclick="login()">LOG IN</button>
<div class="meta"><span>Forgot Password?</span><span>Remembered locally</span></div>
<div class="social"><button class="fb">Facebook</button><button class="gg">Google</button></div>
<div class="switch">New here? <span onclick="showSignup()">Create account</span></div>
<div id="loginMsg" class="msg"></div>
</div>
<div id="signupBox" class="hidden">
<div class="group"><input id="regUser" placeholder="Username"></div>
<div class="group"><input id="regPass" type="password" placeholder="Password"></div>
<button class="btn" onclick="signup()">SIGN UP</button>
<div class="switch">Have account? <span onclick="showLogin()">Log in</span></div>
<div id="signupMsg" class="msg"></div>
</div>
</div>
</section>
<script>
const $=id=>document.getElementById(id);
function showSignup(){ $('loginBox').classList.add('hidden');$('signupBox').classList.remove('hidden');$('loginTab').classList.remove('active');$('signupTab').classList.add('active'); }
function showLogin(){ $('signupBox').classList.add('hidden');$('loginBox').classList.remove('hidden');$('signupTab').classList.remove('active');$('loginTab').classList.add('active'); }
function users(){ return JSON.parse(localStorage.getItem('users')||'[]'); }
function save(arr){ localStorage.setItem('users',JSON.stringify(arr)); }
function signup(){ let u=$('regUser').value.trim(),p=$('regPass').value.trim(); if(!u||!p) return msg('signupMsg','Please fill all fields',1); let arr=users(); if(arr.find(x=>x.user===u)) return msg('signupMsg','User already exists',1); arr.push({user:u,pass:p}); save(arr); msg('signupMsg','Signup successful'); setTimeout(showLogin,700); }
function login(){ let u=$('loginUser').value.trim(),p=$('loginPass').value.trim(); let found=users().find(x=>x.user===u&&x.pass===p); if(!found) return msg('loginMsg','Wrong username or password',1); localStorage.setItem('session','true'); msg('loginMsg','Login success. Redirecting...'); setTimeout(()=>location.href='shop.html',700); }
function msg(id,t,e){ let el=$(id); el.textContent=t; el.className='msg'+(e?' err':''); }
</script>
</body>
</html>
